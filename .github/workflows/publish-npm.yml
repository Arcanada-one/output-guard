name: publish-npm

on:
  push:
    tags:
      - "ts-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish from (default: ts-v0.1.0)"
        required: true
        default: "ts-v0.1.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # npm provenance via OIDC
    defaults:
      run:
        working-directory: packages/ts
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: packages/ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
