name: ci-python

on:
  push:
    branches: [main]
    paths:
      - "packages/python/**"
      - "fixtures-shared/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "packages/python/**"
      - "fixtures-shared/**"
      - ".github/workflows/ci-python.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv pip install --system -e ".[dev]"
      - run: ruff check src tests
      - run: mypy src
      - run: pytest -v
      # pip-audit: not --strict (own package not yet on PyPI; strict-mode errors on un-auditable local install).
      # Upgrade pip first to clear CVE-2026-6357 (fixed in pip 26.1).
      # CVE-2026-3219 (pip) has no fix as of 2026-05-12 — ignore with revisit 2026-08-12 per Arcanada quarterly audit cadence.
      # Once arcanada-output-guard is published (M3), restore --strict.
      - run: python -m pip install --upgrade pip
      - run: pip-audit --ignore-vuln CVE-2026-3219
